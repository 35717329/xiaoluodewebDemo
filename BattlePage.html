<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hash 验证器 · 多人对战</title>
    <style>
        /* 样式保持不变 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0b1220;
            --card-bg: #0f1724;
            --muted: #9aa4b2;
            --accent: #00d1b2;
            --accent-dark: #00a88f;
            --glass: rgba(255, 255, 255, 0.03);
            --border-light: rgba(255, 255, 255, 0.05);
            --text-primary: #e6eef6;
            --text-secondary: #a3b1cc;
            --text-soft: #6b7b98;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --link: #28cfa5;
            --hash-value: #35dddd;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #071122 0%, #0b1220 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, var(--accent), var(--accent-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--muted);
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-light);
        }

        .card-header {
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-light);
        }

        .card-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .remark-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 24px;
        }

        .remark-item {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .remark-item a {
            color: var(--link);
            text-decoration: none;
        }

        .remark-item a:hover {
            text-decoration: underline;
        }

        .game-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            align-items: end;
            background-color: #0d1726;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .info-item label {
            font-size: 14px;
            color: var(--muted);
            font-weight: 500;
        }

        .info-value {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 10px 12px;
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            font-size: 16px;
            transition: all 0.2s;
        }

        .info-value:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .info-value input {
            width: 100%;
            border: none;
            background: transparent;
            outline: none;
            color: var(--text-secondary);
            font-size: 16px;
        }

        .info-value span {
            color: var(--text-secondary);
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            grid-column: span 2;
            justify-self: end;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--accent), var(--accent-dark));
            color: #021217;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 209, 178, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--muted);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .players-results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 24px;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid var(--border-light);
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .player-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3);
        }

        .player-header {
            padding: 20px 20px 0 20px;
        }

        .player-name {
            font-size: 20px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 16px;
        }

        .player-detail {
            margin-bottom: 16px;
        }

        .detail-label {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 6px;
            font-size: 14px;
            color: var(--muted);
        }

        /* 签名右侧信息：区块号在上，链接在下 */
        .signature-info {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .signature-info .block-number {
            color: var(--text-soft);
            font-family: monospace;
            font-size: 12px;
            white-space: nowrap;
        }

        .signature-info a {
            color: var(--link);
            text-decoration: none;
            white-space: nowrap;
            font-size: 13px;
        }

        .detail-value {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            padding: 10px 12px;
            border: 1px solid var(--border-light);
            font-family: monospace;
            font-size: 13px;
            word-break: break-all;
            color: var(--text-secondary);
        }

        .detail-value input {
            width: 100%;
            border: none;
            background: transparent;
            outline: none;
            color: inherit;
            font-family: inherit;
            font-size: inherit;
        }

        .rounds-container {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-top: 1px solid var(--border-light);
            flex: 1;
        }

        .rounds-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #3b5580;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .round-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid var(--border-light);
            margin-bottom: 12px;
            overflow: hidden;
        }

        .round-title {
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.2);
            font-size: 14px;
            color: var(--muted);
            border-bottom: 1px solid var(--border-light);
        }

        .round-hash {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            gap: 12px;
            word-break: break-word;
        }

        .round-hash span:first-child {
            font-family: monospace;
            font-size: 12px;
            color: var(--text-secondary);
            flex: 1;
        }

        .round-hash span:last-child {
            color: var(--hash-value);
            font-weight: 600;
            white-space: nowrap;
        }

        .empty-rounds {
            text-align: center;
            color: var(--muted);
            padding: 30px 20px;
            font-size: 14px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .hint {
            margin-top: 32px;
            color: var(--muted);
            font-size: 14px;
            text-align: center;
        }

        @media (max-width: 640px) {
            .container {
                padding: 16px;
            }

            .game-info-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                grid-column: span 1;
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .players-results {
                grid-template-columns: 1fr;
            }

            .round-hash {
                flex-direction: column;
                align-items: center;
                gap: 8px;
            }
            .round-hash span:first-child {
                word-break: break-all;
                text-align: center;
                width: 100%;
            }
            .round-hash span:last-child {
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>《对战》· 哈希验证</h1>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>验证说明</h2>
        </div>
        <div class="remark-list">
            <span class="remark-item">· 每位玩家都会获取专属于您的 <a href="https://solscan.io" target="_blank">Solana 钱包地址</a>；</span>
            <span class="remark-item">· 游戏时产生的交易签名和区块哈希随机、唯一且不可更改；</span>
            <span class="remark-item">· 开奖结果基于区块哈希使用 SHA256 推算，不可逆推，唯一且不可更改；</span>
            <span class="remark-item">· 任何支持 SHA256 验算的网站都可验证哈希真伪。</span>
        </div>

        <div class="card-header">
            <h2>游戏信息</h2>
        </div>

        <div class="game-info-grid">
            <div class="info-item">
                <label>游戏模式</label>
                <div class="info-value" id="battleMode">-多人对战-</div>
            </div>
            <div class="info-item">
                <label>创建者</label>
                <div class="info-value" id="createUser">----</div>
            </div>
            <div class="info-item">
                <label>参与玩家</label>
                <div class="info-value" id="joinNum">2</div>
            </div>
            <div class="info-item">
                <label>游戏回合</label>
                <div class="info-value">
                    <input type="number" id="round" min="0" max="100" value="5">
                </div>
            </div>
            <div class="button-group">
                <button id="verifyBtn" class="btn btn-primary" disabled>
                    <span>验证结果</span>
                </button>
                <button id="clearBtn" class="btn btn-secondary">清除结果</button>
            </div>
        </div>

        <div class="card-header">
            <h2>开奖哈希</h2>
        </div>

        <div id="playersContainer" class="players-results"></div>
    </div>

    <div class="hint">
        规则：第一轮使用签名+初始区块哈希进行 SHA256，后续每轮对上一轮哈希进行 SHA256 迭代。结果显示为十六进制，归一化值 1-100000。
    </div>
</div>

<script type="module">
    import bs58 from "https://cdn.jsdelivr.net/npm/bs58@5.0.0/+esm";

    let userNum = 2;

    function getUrlParams() {
        const params = new URLSearchParams(window.location.search);
        const playerCount = parseInt(params.get('playerCount')) || 2;
        const validatedPlayerCount = Math.min(Math.max(playerCount, 2), 3);
        const round = parseInt(params.get('round')) || 5;

        const result = {
            playerCount: validatedPlayerCount,
            round: round
        };

        for (let i = 1; i <= validatedPlayerCount; i++) {
            result[`player${i}Name`] = params.get(`player${i}Name`) || `玩家${i}`;
            result[`player${i}Sign`] = params.get(`player${i}Sign`) || '';
            result[`player${i}Hash`] = params.get(`player${i}Hash`) || '';
            result[`player${i}Block`] = params.get(`player${i}Block`) || '';
        }
        return result;
    }

    async function hashData(data) {
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        return new Uint8Array(hashBuffer);
    }

    // 归一化到 1-100000
    async function normalizeHash(decoded) {
        try {
            const hashArray = Array.from(decoded);
            let hashValue = 0n;
            for (const byte of hashArray) {
                hashValue = (hashValue << 8n) + BigInt(byte);
            }
            const maxValue = (1n << 256n) - 1n;
            const scaled = Number(hashValue) / Number(maxValue);
            let a = scaled * 100000;
            a = Math.floor(scaled * 100000);
            return a;
        } catch (e) {
            console.error('归一化错误:', e);
            return 1;
        }
    }

    // 将字节数组转换为十六进制字符串
    function bytesToHex(bytes) {
        return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function updateVerifyButton() {
        const verifyBtn = document.getElementById('verifyBtn');
        let allFilled = true;
        for (let i = 0; i < userNum; i++) {
            const signInput = document.getElementById(`userSign_${i}`);
            const hashInput = document.getElementById(`blockHash_${i}`);
            if (!signInput || !hashInput) {
                allFilled = false;
                break;
            }
            const signVal = signInput.value.trim();
            const hashVal = hashInput.value.trim();
            if (!signVal || !hashVal) {
                allFilled = false;
                break;
            }
        }
        verifyBtn.disabled = !allFilled;
    }

    function initPage() {
        const params = getUrlParams();
        userNum = params.playerCount;
        document.getElementById('round').value = params.round;
        document.getElementById('joinNum').innerText = userNum;

        document.getElementById('battleMode').innerText = '-多人对战-';
        document.getElementById('createUser').innerText = '----';

        renderPlayerCards(params);
        initEmptyResults();

        // 绑定输入事件以实时更新按钮状态
        for (let i = 0; i < userNum; i++) {
            const signInput = document.getElementById(`userSign_${i}`);
            const hashInput = document.getElementById(`blockHash_${i}`);
            if (signInput) signInput.addEventListener('input', updateVerifyButton);
            if (hashInput) hashInput.addEventListener('input', updateVerifyButton);
        }
        updateVerifyButton();

        document.getElementById('verifyBtn').addEventListener('click', verifyGames);
        document.getElementById('clearBtn').addEventListener('click', () => {
            initEmptyResults();
        });
        document.getElementById('round').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') verifyGames();
        });
    }

    function renderPlayerCards(params) {
        const container = document.getElementById('playersContainer');
        let html = '';
        for (let i = 1; i <= userNum; i++) {
            const playerName = params[`player${i}Name`] || `玩家${i}`;
            const sign = params[`player${i}Sign`] || '';
            const hash = params[`player${i}Hash`] || '';
            const block = params[`player${i}Block`] || '';

            html += `
                <div class="player-card" id="playerCard_${i-1}">
                    <div class="player-header">
                        <div class="player-name">${playerName}</div>

                        <!-- 签名行：区块号整合在右侧（区块号在上，链接在下） -->
                        <div class="player-detail">
                            <div class="detail-label">
                                <span>签名</span>
                                <div class="signature-info">
                                    <span class="block-number">区块号: ${block || '--'}</span>
                                    <a href="https://solscan.io/tx/${sign}" target="_blank">在 Solana 查看 →</a>
                                </div>
                            </div>
                            <div class="detail-value">
                                <input id="userSign_${i-1}" value="${sign}" placeholder="Base58 签名">
                            </div>
                        </div>

                        <!-- 区块哈希 -->
                        <div class="player-detail">
                            <div class="detail-label">区块哈希</div>
                            <div class="detail-value">
                                <input id="blockHash_${i-1}" value="${hash}" placeholder="Base58 区块哈希">
                            </div>
                        </div>
                    </div>
                    <div class="rounds-container">
                        <div class="rounds-header">
                            <span>哈希值 (Hex)</span>
                            <span>区间值 (1-100000)</span>
                        </div>
                        <div id="resultRound_${i-1}" class="empty-rounds">
                            点击 "验证结果" 按钮开始验证
                        </div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function initEmptyResults() {
        for (let i = 0; i < userNum; i++) {
            const el = document.getElementById(`resultRound_${i}`);
            if (el) {
                el.innerHTML = '<div class="empty-rounds">点击 "验证结果" 按钮开始验证</div>';
            }
        }
    }

    function setVerifying(state) {
        const btn = document.getElementById('verifyBtn');
        btn.disabled = state;
        if (state) {
            btn.innerHTML = '<div class="loading"></div><span>验证中...</span>';
        } else {
            btn.innerHTML = '<span>验证结果</span>';
            updateVerifyButton();
        }
    }

    async function verifyGames() {
        // 再次检查输入
        let allFilled = true;
        for (let i = 0; i < userNum; i++) {
            const signInput = document.getElementById(`userSign_${i}`);
            const hashInput = document.getElementById(`blockHash_${i}`);
            if (!signInput || !hashInput || !signInput.value.trim() || !hashInput.value.trim()) {
                allFilled = false;
                break;
            }
        }
        if (!allFilled) {
            alert('请填写所有玩家的签名和区块哈希');
            setVerifying(false);
            return;
        }

        setVerifying(true);
        const roundCount = parseInt(document.getElementById('round').value) || 1;
        const playerPromises = [];

        try {
            for (let i = 0; i < userNum; i++) {
                const signInput = document.getElementById(`userSign_${i}`);
                const hashInput = document.getElementById(`blockHash_${i}`);
                if (!signInput || !hashInput) continue;

                const signBase58 = signInput.value.trim();
                const blockHashBase58 = hashInput.value.trim();

                const decodedSign = bs58.decode(signBase58);
                const decodedHash = bs58.decode(blockHashBase58);

                playerPromises.push({
                    id: i,
                    sign: decodedSign,
                    blockHash: decodedHash
                });
            }

            for (const player of playerPromises) {
                const roundsHtml = [];
                const combined = new Uint8Array(player.sign.length + player.blockHash.length);
                combined.set(player.sign, 0);
                combined.set(player.blockHash, player.sign.length);
                let hashBytes = await hashData(combined);
                let hexStr = bytesToHex(hashBytes);
                let normalized = await normalizeHash(hashBytes);
                roundsHtml.push(`
                    <div class="round-item">
                        <div class="round-title">第 1 回合 · 签名+区块哈希</div>
                        <div class="round-hash">
                            <span>${hexStr}</span>
                            <span>${normalized}</span>
                        </div>
                    </div>
                `);

                let previousHex = hexStr;
                for (let r = 2; r <= roundCount; r++) {
                    // 将十六进制字符串编码为 UTF-8 字节
                    const encoder = new TextEncoder();
                    const inputBytes = encoder.encode(previousHex);
                    hashBytes = await hashData(inputBytes);
                    hexStr = bytesToHex(hashBytes);
                    normalized = await normalizeHash(hashBytes);

                    roundsHtml.push(`
                        <div class="round-item">
                            <div class="round-title">第 ${r} 回合 · SHA256</div>
                            <div class="round-hash">
                                <span>${hexStr}</span>
                                <span>${normalized}</span>
                            </div>
                        </div>
                    `);

                    previousHex = hexStr;
                }

                const resultDiv = document.getElementById(`resultRound_${player.id}`);
                if (resultDiv) {
                    resultDiv.innerHTML = roundsHtml.join('');
                }
            }
        } catch (error) {
            console.error('验证出错:', error);
            alert('验证失败：' + error.message);
        } finally {
            setVerifying(false);
        }
    }

    document.addEventListener('DOMContentLoaded', initPage);
</script>
</body>
</html>
