<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Hash验证器</title>
    <style>
        :root {
            --bg: #0b1220;
            --card: #0f1724;
            --muted: #9aa4b2;
            --accent: #00d1b2;
            --accent-dark: #00a88f;
            --glass: rgba(255, 255, 255, 0.03);
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --text-soft: #6b7b98;
            --link: #28cfa5;
            --border-light: rgba(255, 255, 255, 0.05);
            --text-secondary: #a3b1cc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #071122 0%, #0b1220 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #e6eef6;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, var(--accent), var(--accent-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--muted);
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-header {
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .remark-list {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .remark-highlight {
            color: #ffd700; /* 金色 */
            font-weight: 600;
            background: rgba(255, 215, 0, 0.1);
            padding: 2px 4px;
            border-radius: 4px;
        }

        .remark-list-item {
            font-family: "Microsoft YaHei";
            font-size: 14px;
            font-weight: normal;
            line-height: 14px;
            letter-spacing: normal;
            color: #A3B1CC;
        }

        .remark-list-item a {
            color: #28CFA5;
        }

        /* 游戏信息网格 */
        .game-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            align-items: end;
            background-color: #0D1726;
            /*padding: 16px;*/
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .info-item {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 6px;
        }

        .info-item label {
            font-size: 14px;
            color: var(--muted);
            font-weight: 500;
        }

        .info-value {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #C8D8F8;
            font-size: 16px;
            transition: all 0.2s;
        }

        /* .info-value:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        } */

        .info-value input {
            width: 100%;
            border: none;
            background: transparent;
            outline: none;
            color: #C8D8F8;
            font-size: 16px;
        }

        .info-value span {
            color: #C8D8F8;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-self: start;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--accent), var(--accent-dark));
            color: #021217;
        }

        /* .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 209, 178, 0.3);
        } */

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--muted);
        }

        /* .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
        } */

        .result-info {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .result-info-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .result-info-card-item {
            margin-bottom: 16px;
        }

        .result-info-card-item .title {
            font-size: 16px;
            line-height: 32px;
            display: inline-block;
            margin-bottom: 4px;
            color: var(--muted);
        }

        .detail-label {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 6px;
            font-size: 16px;
            color: var(--muted);
        }

        .signature-info {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .signature-info a {
            color: var(--link);
            text-decoration: none;
            white-space: nowrap;
            font-size: 18px;
        }

        .div-round {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 4px;
            font-size: 14px;
            color: var(--muted);
        }

        .round-hash-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 12px;
            word-break: break-word;
            gap: 12px;
        }

        .round-hash-item span:first-child {
            font-family: monospace;
            font-size: 12px;
            color: #C8D8F8;
            flex: 1;
        }

        .round-hash-item span:last-child {
            color: #35DDDD;
            font-weight: 600;
            white-space: nowrap;
        }

        .empty-rounds {
            text-align: center;
            color: var(--muted);
            padding: 30px 20px;
            font-size: 14px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .hint {
            margin-top: 16px;
            color: var(--muted);
            font-size: 14px;
            text-align: center;
        }

        details {
            border: 1px solid #e3ff6a;
            border-radius: 8px;
            padding: 0.5em 0.5em 0;
        }

        summary {
            font-weight: bold;
            margin: -0.5em -0.5em 0;
            padding: 0.5em;
        }

        details[open] {
            padding: 0.5em;
        }

        details[open] summary {
            border-bottom: 1px solid #e3ff6a;
            margin-bottom: 0.5em;
        }

        .toolbar {
            display: flex;
            gap: 12px;
            align-items: center;
            margin: 0 0 8px 0;
        }

        button {
            background: #50fa7b;
            border: none;
            color: #1e1e2f;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .clear-btn {
            background: #ff5555;
            color: white;
        }

        .rest-btn {
            background: #0e73ef;
            color: white;
        }

        .div-code-textarea {
            display: grid;
            margin: 0 0 8px 0;
        }

        .code-textarea {
            background: #1e1f29;
            color: #f8f8f2;
            border: 1px solid #44475a;
            border-radius: 12px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            padding: 16px;
            resize: none;
            outline: none;
            height: 300px;
        }

        .output-area {
            background: #0f0f16;
            border-radius: 12px;
            padding: 12px 16px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
            border: 1px solid #44475a;
            margin: 0 0 8px 0;
        }

        .output-title {
            color: #bd93f9;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            gap: 16px;
            align-items: baseline;
        }

        .output-content {
            color: #e9e9f4;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 90%);
            color: #000000;
            padding: 20px 40px;
            border-radius: 5px;
            display: none; /* 默认隐藏 */
            z-index: 1000;
        }

        @media (max-width: 640px) {
            .container {
                padding: 16px;
            }
            .game-info-grid {
                grid-template-columns: 1fr;
            }
            .button-group {
                justify-self: stretch;
            }
            .btn {
                flex: 1;
            }
            .round-hash-item {
                flex-direction: column;
                align-items: center;
                gap: 8px;
            }
            .round-hash-item span:first-child {
                text-align: center;
                width: 100%;
            }

            .info-item {
                flex-wrap: wrap;
                flex: 0 0 100%;
            }
        }

        /* 公式按钮和弹窗样式 */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative; /* 为气泡定位 */
        }

        .btn-formula {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--muted);
            padding: 6px 16px;
            font-size: 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-formula:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .formula-popup {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            width: 400px;
            background: var(--card);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: none;
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }

        .formula-popup.show {
            display: block;
        }

        .formula-popup p {
            margin-bottom: 8px;
        }

        .formula-popup code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 4px;
            border-radius: 4px;
            color: var(--accent);
        }

        @media (max-width: 640px) {
            .formula-popup {
                width: 280px;
                right: 0;
            }
        }
    </style>
</head>
<body>
<div id="toast" class="toast">操作成功</div>
<div class="container">
    <div class="header">
        <h1>Hash验证器</h1>
        <!-- <p>从 URL 获取初始哈希（十六进制），迭代显示每轮结果</p> -->
    </div>

    <div class="card">
        <div class="toolbar">
            <button id="runBtn">&#9654; 运行</button>
            <button id="clearOutputBtn" class="clear-btn">🗑 清空打印</button>
            <button id="restCodeBtn" class="rest-btn">&#8635; 重置</button>
            <button id="showCodeEditorBtn" class="rest-btn">▼ 展开</button>
            <button id="copyCodeBtn" class="rest-btn">复制代码</button>
        </div>
        <details id="codePanel">
            <summary>JS代码在线编辑</summary>
            <div class="div-code-textarea">
                <textarea id="codeEditor" class="code-textarea" placeholder="在这里编写 JavaScript 代码...">
                </textarea>
            </div>
            <div class="output-area">
                <div class="output-title">
                    <span>📋 结果输出</span>
                </div>
                <div id="outputContent" class="output-content">✨ 点击「运行代码」查看结果</div>
            </div>
        </details>
    </div>

    <div class="card">
        <div class="result-info-card">
            <div class="info-item">
                <label>回合</label>
                <div class="info-value">
                    <input type="number" id="round" min="0" max="100" value="">
                </div>
                <label>转换率</label>
                <div class="info-value">
                    <input type="number" id="ratioInput" min="0" max="100" value="">
                </div>
            </div>
            <div class="result-info-card-item">
                <span class="title">初始哈希值 (Hex)</span>
                <div class="info-value">
                    <input id="blockHashInp" placeholder="输入十六进制哈希" value="">
                </div>
            </div>
        </div>

        <div class="card-header">
            <h2>以下数值经过“JS代码在线编辑”运行后得到的结果</h2>
        </div>
        <div class="result-info">
            <div class="result-info-card">
                <div class="result-info-card-item">
                    <div>
                        <span style="font-size: 14px; color: #3B5580;">哈希值 (Hex)</span>
                    </div>
                </div>
                <div class="result-info-card-item" id="resultRound">
                </div>
            </div>
        </div>
    </div>

</div>

        verifyBtn.disabled = value;

        defaultCode = `
//计算基础hash值
async function computeBaseHash(str) {
    //1.转换为 UTF-8 编码字节序列
    const encoder = new TextEncoder();
    const bytes = encoder.encode(str);
    //2.字节数组
    let bytesArr = await computeSha256(bytes);
    //3.拼接16进制字符串
    let hexString = bytesToHex(bytesArr);
    console.log("方法内转换后的16进制字符串： ",hexString);
    return hexString;
}

//计算字节数组的sha256值
async function computeSha256(data) {
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    return new Uint8Array(hashBuffer);
}

//十六进制转字节数组
function hexToBytes(hex) {
    const bytes = new Uint8Array(hex.length / 2);
    for (let i = 0; i < hex.length; i += 2) {
        bytes[i / 2] = parseInt(hex.substr(i, 2), 16);
    }
    return bytes;
}

//将字节数组转换为十六进制字符串
function bytesToHex(bytes) {
    return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
}

//对字节数组进行归一化
async function normalizeHash(decoded) {
    try {
        // 将字节数组转化为大整数（无符号）
        // 将 Uint8Array 转换为十六进制字符串，再转为 BigInt
        const hexString = Array.from(decoded)
            .map(b => b.toString(16).padStart(2, '0'))
            .join('');
        const hashValue = BigInt('0x' + hexString);

        // 归一化，分母为 2^256
        const maxValue = 2n ** 256n;

        // 转换为归一化的小数（0 到 1 之间，但不包括 1）
        // 由于 BigInt 除法会截断，这里转换为 Number
        const normalizedValue = Number(hashValue) / Number(maxValue);

        return normalizedValue;
    } catch (e) {
        throw new Error("normalizeHash Fail:" + e.message);
    }
}

//对归一化值进行转换
function covertNum(num) {
    let floorMultiplier = ${params.ratio} / (1.0 - num);
    if (floorMultiplier < 100) {
        floorMultiplier = 100;
    }
    floorMultiplier = parseInt(floorMultiplier);
    //拆分为整数部分和两位小数
    return floorMultiplier / 100;;
}

class UserInfo {
    roundNum = 0;
    hexStr = "";
    boxNum = 0;
}
//根据字符串和回合数生成自己的信息
async function creatSelfInfo(str, roundNum) {
    let info = [];
    const encoder = new TextEncoder();
    let previousHex = str;

    //默认hash值算出的结果
    let firstBytes = hexToBytes(str);
    let firstBoxNum = await normalizeHash(firstBytes);
    firstBoxNum = covertNum(firstBoxNum);
    let firstRound = new UserInfo();
    firstRound.roundNum = 1;
    firstRound.hexStr = str;
    firstRound.boxNum = firstBoxNum;
    info.push(firstRound);

    for (let i = 1; i < roundNum; i++) {
        let userInfo = new UserInfo();
        // 将十六进制字符串编码为 UTF-8 字节
        const inputBytes = encoder.encode(previousHex);
        const hashBytes = await computeSha256(inputBytes);
        const hexStr = bytesToHex(hashBytes);
        let normalized = await normalizeHash(hashBytes);
        normalized = covertNum(normalized);
        // console.log("当前 ", i);
        // console.log("16进制字符串 ", hexStr);
        // console.log("随机值 ", normalized);
        userInfo.roundNum = i + 1;
        userInfo.hexStr = hexStr;
        userInfo.boxNum = normalized;
        info.push(userInfo);
        previousHex = hexStr;
    }

    return info;
}

async function main() {
    let result = [];
    //生成自己的信息
    let userInfoList = await creatSelfInfo("${params.blockHash}", ${params.round});
    console.log("userInfoList  ", userInfoList);
    result.push(userInfoList);
    return result;
}
return await main();
`;

    // 清空输出显示 (不清空捕获数组，每次运行会重置)
    function clearOutputDisplay() {
        outputContentDiv.innerHTML = '';

    // 添加一条输出 (支持多种类型)
    function addOutput(message, type = 'log') {
        const line = document.createElement('div');
        line.style.marginBottom = '4px';
        line.style.borderBottom = '1px solid #2a2c3a';
        line.style.paddingBottom = '4px';

        let prefix = '';
        if (type === 'error') prefix = '❌ ';
        else if (type === 'warn') prefix = '⚠️ ';
        else if (type === 'info') prefix = 'ℹ️ ';

        const prefixSpan = document.createElement('span');
        if (type === 'error') prefixSpan.style.color = '#ff79c6';
        else if (type === 'warn') prefixSpan.style.color = '#f1fa8c';
        else prefixSpan.style.color = '#8be9fd';

        prefixSpan.textContent = prefix;

        const messageSpan = document.createElement('span');
        messageSpan.style.color = '#f8f8f2';
        // 将对象/数组等转为可读字符串
        let displayMsg;
        try {
            if (typeof message === 'object') {
                displayMsg = JSON.stringify(message, null, 2);
            } else {
                displayMsg = String(message);
            }
        } catch(e) {
            displayMsg = String(message);
        }
        messageSpan.textContent = displayMsg;

        line.appendChild(prefixSpan);
        line.appendChild(messageSpan);
        outputContentDiv.appendChild(line);
        // 自动滚动到底部
        outputContentDiv.parentElement.parentElement.scrollTop = outputContentDiv.parentElement.parentElement.scrollHeight;
    }

    // 清空输出 (仅清显示，不清console历史)
    function clearOutput() {
        outputContentDiv.innerHTML = '';

    const anonymous_fun = (function() {
        // 保存原始的 console 方法
        const originalConsole = {
            log: console.log,
            error: console.error,
            warn: console.warn,
            info: console.info
        };

        // 运行代码的核心函数
        // 异步执行代码的核心函数
        async function runCodeAsync(code) {
            // 1. 重置捕获日志数组
            capturedLogs = [];

            // 2. 临时替换 console 方法
            console.log = (...args) => {
                capturedLogs.push({ type: 'log', args });
                originalConsole.log(...args);
            };
            console.error = (...args) => {
                capturedLogs.push({ type: 'error', args });
                originalConsole.error(...args);
            };
            console.warn = (...args) => {
                capturedLogs.push({ type: 'warn', args });
                originalConsole.warn(...args);
            };
            console.info = (...args) => {
                capturedLogs.push({ type: 'info', args });
                originalConsole.info(...args);
            };

            // 3. 清空输出显示区域 (UI)
            clearOutputDisplay();

            let executionError = null;
            let result = undefined;
            try {
                // 包装成 async 函数执行
                const asyncFunction = new Function(`
                    return (async function() {
                        ${code}
                    })();
                `);
                result = await asyncFunction();
                // 如果有返回值且非 undefined，也打印到控制台
                if (result !== undefined) {
                    capturedLogs.push({ type: 'log', args: ['返回值 =>', result] });
                }
                isCodePass = true;
            } catch (err) {
                isCodePass = false;
                executionError = err;
                capturedLogs.push({ type: 'error', args: [err.message || err] });
            } finally {
                // 6. 恢复原始 console
                console.log = originalConsole.log;
                console.error = originalConsole.error;
                console.warn = originalConsole.warn;
                console.info = originalConsole.info;
            }

            // 7. 将所有捕获的日志渲染到输出区
            for (const log of capturedLogs) {
                // 合并参数为一个字符串（简单处理）
                const message = log.args.map(arg => {
                    if (typeof arg === 'object') {
                        try {
                            return JSON.stringify(arg);
                        } catch(e) {
                            return String(arg);
                        }
                    }
                    return String(arg);
                }).join(' ');
                addOutput(message, log.type);
            }

            // 8. 如果执行错误，额外加提示
            if (executionError) {
                addOutput(`执行异常: ${executionError.message}`, 'error');
            }
            return result;
        }

        // // 运行按钮点击处理
        // async function onRunClick() {

        // 返回需要暴露的函数，因为需要new Function中的结果来渲染界面，所以只能把运行代码的函数抛出给顶层使用
        return {
            run: runCodeAsync
        };
    })();

    function showCryptoStatus() {
        const status = {
            hasCrypto: !!window.crypto,
            hasSubtle: !!(window.crypto && window.crypto.subtle),
            hasDigest: !!(window.crypto && window.crypto.subtle && crypto.subtle.digest),
            isSecureContext: window.isSecureContext || false,
            userAgent: navigator.userAgent
        };

        console.log('Crypto 状态:', status);

        if (!status.hasCrypto) {
            console.log('❌ 不支持任何 Crypto API');
        } else if (!status.hasSubtle) {
            console.log('⚠️ 支持基础 Crypto，但不支持 Web Crypto API');
            console.log('   建议升级浏览器: Chrome 37+, Firefox 34+, Safari 11+');
        } else if (!status.isSecureContext) {
            console.log('⚠️ Web Crypto API 需要 HTTPS 或 localhost');
            console.log('   当前环境:', location.protocol);
        } else {
            console.log('✅ 完全支持 Web Crypto API');
        }

        return status;
    }
