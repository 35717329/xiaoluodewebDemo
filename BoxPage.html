<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Hash验证器</title>
    <style>
        :root {
            --bg: #0b1220;
            --card: #0f1724;
            --muted: #9aa4b2;
            --accent: #00d1b2;
            --accent-dark: #00a88f;
            --glass: rgba(255, 255, 255, 0.03);
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --text-soft: #6b7b98;
            --link: #28cfa5;
            --border-light: rgba(255, 255, 255, 0.05);
            --text-secondary: #a3b1cc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #071122 0%, #0b1220 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #e6eef6;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, var(--accent), var(--accent-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--muted);
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-header {
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .remark-highlight {
            color: #ffd700; /* 金色 */
            font-weight: 600;
            background: rgba(255, 215, 0, 0.1);
            padding: 2px 4px;
            border-radius: 4px;
        }

        .remark-list {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .remark-list-item {
            font-family: "Microsoft YaHei";
            font-size: 14px;
            font-weight: normal;
            line-height: 14px;
            letter-spacing: normal;
            color: #A3B1CC;
        }

        .remark-list-item a {
            color: #28CFA5;
        }

        /* 游戏信息网格 */
        .game-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            align-items: end;
            background-color: #0D1726;
            /*padding: 16px;*/
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .info-item label {
            font-size: 14px;
            color: var(--muted);
            font-weight: 500;
        }


        .info-value {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #C8D8F8;
            font-size: 16px;
            transition: all 0.2s;
        }

        /* .info-value:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        } */

        .info-value input {
            width: 100%;
            border: none;
            background: transparent;
            outline: none;
            color: #C8D8F8;
            font-size: 16px;
        }

        .info-value span {
            color: #C8D8F8;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-self: start;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--accent), var(--accent-dark));
            color: #021217;
        }

        /* .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 209, 178, 0.3);
        } */

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--muted);
        }

        /* .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
        } */

        .result-info {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .result-info-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .result-info-card-item {
            margin-bottom: 16px;
        }

        .result-info-card-item .title {
            font-size: 16px;
            line-height: 32px;
            display: inline-block;
            margin-bottom: 4px;
            color: var(--muted);
        }
        .result-info-card-item .block-number {
            color: var(--text-soft);
            font-family: monospace;
            font-size: 12px;
            white-space: nowrap;
        }

        .detail-label {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 6px;
            font-size: 16px;
            color: var(--muted);
        }

        .signature-info {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }



        .signature-info a {
            color: var(--link);
            text-decoration: none;
            white-space: nowrap;
            font-size: 18px;
        }

        .div-round {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 4px;
            font-size: 14px;
            color: var(--muted);
        }

        .round-hash-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 12px;
            word-break: break-word;
            gap: 12px;
        }

        .round-hash-item span:first-child {
            font-family: monospace;
            font-size: 12px;
            color: #C8D8F8;
            flex: 1;
        }

        .round-hash-item span:last-child {
            color: #35DDDD;
            font-weight: 600;
            white-space: nowrap;
        }

        .empty-rounds {
            text-align: center;
            color: var(--muted);
            padding: 30px 20px;
            font-size: 14px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
        }

        

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .hint {
            margin-top: 16px;
            color: var(--muted);
            font-size: 14px;
            text-align: center;
        }

        details {
            border: 1px solid #e3ff6a;
            border-radius: 8px;
            padding: 0.5em 0.5em 0;
        }

        summary {
            font-weight: bold;
            margin: -0.5em -0.5em 0;
            padding: 0.5em;
        }

        details[open] {
            padding: 0.5em;
        }

        details[open] summary {
            border-bottom: 1px solid #e3ff6a;
            margin-bottom: 0.5em;
        }

        .toolbar {
            display: flex;
            gap: 12px;
            align-items: center;
            margin: 0 0 8px 0;
        }

        button {
            background: #50fa7b;
            border: none;
            color: #1e1e2f;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .clear-btn {
            background: #ff5555;
            color: white;
        }

        .rest-btn {
            background: #0e73ef;
            color: white;
        }

        .div-code-textarea {
            display: grid;
            margin: 0 0 8px 0;
        }

        .code-textarea {
            background: #1e1f29;
            color: #f8f8f2;
            border: 1px solid #44475a;
            border-radius: 12px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            padding: 16px;
            resize: none;
            outline: none;
            height: 300px;
        }

        .output-area {
            background: #0f0f16;
            border-radius: 12px;
            padding: 12px 16px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
            border: 1px solid #44475a;
            margin: 0 0 8px 0;
        }

        .output-title {
            color: #bd93f9;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            gap: 16px;
            align-items: baseline;
        }

        .output-content {
            color: #e9e9f4;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 90%);
            color: #000000;
            padding: 20px 40px;
            border-radius: 5px;
            display: none; /* 默认隐藏 */
            z-index: 1000;
        }

        @media (max-width: 640px) {
            .container {
                padding: 16px;
            }
            .game-info-grid {
                grid-template-columns: 1fr;
                justify-self: stretch;
            }
            .button-group {
                justify-self: stretch;
            }
            .btn {
                flex: 1;
            }
            .round-hash-item {
                flex-direction: column;
                align-items: center;
                gap: 8px;
            }
            .round-hash-item span:first-child {
                text-align: center;
                width: 100%;
            }
        }
        /* 公式按钮和弹窗样式 */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative; /* 为气泡定位 */
        }

        .btn-formula {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--muted);
            padding: 6px 16px;
            font-size: 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-formula:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .formula-popup {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            width: 400px;
            background: var(--card);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: none;
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }

        .formula-popup.show {
            display: block;
        }

        .formula-popup p {
            margin-bottom: 8px;
        }

        .formula-popup code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 4px;
            border-radius: 4px;
            color: var(--accent);
        }

        @media (max-width: 640px) {
            .formula-popup {
                width: 280px;
                right: 0;
            }
        }
    </style>
</head>
<body>
<div id="toast" class="toast">操作成功</div>
<div class="container">
    <div class="header">
        <h1>Hash验证器</h1>
    </div>

    <div class="card">
        <div class="toolbar">
            <button id="runBtn">&#9654; 运行</button>
            <button id="clearOutputBtn" class="clear-btn">🗑 清空打印</button>
            <button id="restCodeBtn" class="rest-btn">&#8635; 重置</button>
            <button id="showCodeEditorBtn" class="rest-btn">▼ 展开</button>
            <button id="copyCodeBtn" class="rest-btn">复制代码</button>
        </div>
        <details id="codePanel">
            <summary>JS代码在线编辑</summary>
            <div class="div-code-textarea">
                <textarea id="codeEditor" class="code-textarea" placeholder="在这里编写 JavaScript 代码...">
                </textarea>
            </div>
            <div class="output-area">
                <div class="output-title">
                    <span>📋 结果输出</span>
                </div>
                <div id="outputContent" class="output-content">✨ 点击「运行代码」查看结果</div>
            </div>
        </details>
    </div>

    <div class="card">
        <div class="game-info-grid">
            <div class="info-item">
                <label>上一个BlockHash（h-1）</label>
                <div class="info-value">
                    <input id="blockHashAfterInp" value="">
                </div>
            </div>
        </div>
        <div class="game-info-grid">
            <div class="info-item">
                <label>当前BlockHash（h0）</label>
                <div class="info-value">
                    <input id="blockHashInp" value="">
                </div>
            </div>
        </div>
        <div class="game-info-grid">
            <div class="info-item">
                <label>下一个BlockHash（h1）</label>
                <div class="info-value">
                    <input id="blockHashLast1Inp" value="">
                </div>
            </div>
        </div>
        <div class="game-info-grid">
            <div class="info-item">
                <label>下一个BlockHash（h2）</label>
                <div class="info-value">
                    <input id="blockHashLast2Inp" value="">
                </div>
            </div>
        </div>
        <div class="game-info-grid">
            <div class="info-item">
                <label>下一个BlockHash（h3）</label>
                <div class="info-value">
                    <input id="blockHashLast3Inp" value="">
                </div>
            </div>
        </div>
        <div class="game-info-grid">
            <div class="info-item ">
                <label>回合</label>
                <div class="info-value">
                    <input type="number" id="round" min="0" max="100" value="0">
                </div>
            </div>
        </div>

        <div class="card-header">
            <h2>以下数值经过“JS代码在线编辑”运行后得到的结果</h2>
        </div>
        <div class="result-info">
            <div class="result-info-card">
                <div class="result-info-card-item">
                    <div class="detail-label">
                        <span>钱包地址</span>
                        <div class="signature-info">
                            <a id="solanaScanLink" target="_blank">在 Solana 查看 →</a>
                        </div>
                    </div>
                    <div class="info-value">
                        <input id="userWalletInp" value="">
                    </div>
                </div>
            </div>
            <div class="result-info-card">
                <div class="result-info-card-item">
                    <div>
                        <span style="font-size: 14px; color: #3B5580;">哈希值 (Hex)</span>
                        <span style="font-size: 14px; color: #3B5580; float: right">区间值 (0-99999)</span>
                    </div>
                </div>
                <div class="result-info-card-item" id="resultRound">
                    <div class="empty-rounds"></div>
                    <!-- 点击 "验证结果" 按钮，进行验证 -->
                </div>
            </div>
        </div>
    </div>

</div>

        result.userWallet = params.get('u1') || "";

    async function initPage() {
        const params = getUrlParams();
        setCodeAndInfo(params);
        restCode();

        let userRoundList = await anonymous_fun.run(defaultCode);
        if (!isCodePass) {
            alert("js代码执行异常，请先处理异常，或重置代码");
        }
        for (let i = 0; i < userRoundList.length; i++) {
            setUserRoundInfo(userRoundList[i]);
        }
    }

    function initEmptyResult() {
        document.getElementById('resultRound').innerHTML = `
            <div class="empty-rounds">点击 "运行" 按钮，开始验证</div>
        `;
    }

    /**
     * 设置区块信息和代码
     * 必须参数
     * blockHash_1 上一个区块hash
     * blockHash 当前区块hash
     * blockHash_2 下一个区块hash1
     * blockHash_3 下一个区块hash2
     * blockHash_4 下一个区块hash3
     * userWallet 用户钱包地址
     * round 回合数
     * @param params
     */
    function setCodeAndInfo(params) {
        blockHashAfterInp.value = params.blockHash_1;
        blockHashInp.value = params.blockHash;
        blockHashLast1Inp.value = params.blockHash_2;
        blockHashLast2Inp.value = params.blockHash_3;
        blockHashLast3Inp.value = params.blockHash_4;
        userWalletInp.value = params.userWallet;
        roundInput.value = params.round;
        defaultCode = `
//计算基础hash值
async function computeBaseHash(str) {
    //字符串长度不是偶数，则在字符串前补0
    if (str.length % 2 === 1) {
        str = "0" + str;
    }
    //1.转换为 UTF-8 编码字节序列
    const encoder = new TextEncoder();
    const bytes = encoder.encode(str);
    //2.字节数组
    let bytesArr = await computeSha256(bytes);
    //3.拼接16进制字符串
    let hexString = bytesToHex(bytesArr);
    console.log("方法内转换后的16进制字符串： ",hexString);
    return hexString;
}

//计算字节数组的sha256值
async function computeSha256(data) {
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    return new Uint8Array(hashBuffer);
}

//将字节数组转换为十六进制字符串
function bytesToHex(bytes) {
    return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
}

//对字节数组进行归一化后算出随机值
async function normalizeHash(decoded) {
    try {
        const hashArray = Array.from(decoded);
        let hashValue = 0n;
        for (const byte of hashArray) {
            hashValue = (hashValue << 8n) + BigInt(byte);
        }
        const maxValue = 1n << 256n;          // 2^256
        // 使用 BigInt 计算缩放值，避免精度丢失
        const scaledBigInt = (hashValue * 100000n) / maxValue;
        return Number(scaledBigInt);
    } catch (e) {
        console.error('归一化错误:', e);
        return 1;
    }
}
class UserInfo {
    roundNum = 0;
    hexStr = "";
    boxNum = 0;
}
//根据字符串和回合数生成自己的信息
async function creatSelfInfo(str, roundNum) {
    let info = [];
    const encoder = new TextEncoder();
    let previousHex = str;
    for (let i = 0; i < roundNum; i++) {
        let userInfo = new UserInfo();
        // 将十六进制字符串编码为 UTF-8 字节
        const inputBytes = encoder.encode(previousHex);
        const hashBytes = await computeSha256(inputBytes);
        const hexStr = bytesToHex(hashBytes);
        const normalized = await normalizeHash(hashBytes);
        // console.log("当前 ", i);
        // console.log("16进制字符串 ", hexStr);
        // console.log("随机值 ", normalized);
        userInfo.roundNum = i + 1;
        userInfo.hexStr = hexStr;
        userInfo.boxNum = normalized;
        info.push(userInfo);
        previousHex = hexStr;
    }

    return info;
}

async function main() {
    let result = [];
    let str = "${params.blockHash_1}" + "${params.blockHash}" + "${params.blockHash_2}" + "${params.blockHash_3}" + "${params.blockHash_4}";
    let base = await computeBaseHash(str);
    console.log("得到的16进制字符串： ",base);
    //用户自己的公钥
    let userPublicKey = "${params.userWallet}";
    let basePublicKey = base + userPublicKey;
    //生成自己的信息
    let userInfoList = await creatSelfInfo(basePublicKey, ${params.round});
    console.log("userInfoList  ", userInfoList);
    result.push(userInfoList);
    return result;
}
return await main();
`;
    }

    //重置默认代码
    function restCode() {
        const params = getUrlParams();
        setCodeAndInfo(params);
        codeEditor.value = defaultCode;
        initEmptyResult();
    }

    //显示或隐藏代码面板
    function showCodeEditor() {
        codePanel.open = !codePanel.open;
        setBtnText();
    }

    //修改按钮文本
    function setBtnText() {
        if (codePanel.open) {
            showCodeEditorBtn.innerText = `▲ 收起`;
        } else {
            showCodeEditorBtn.innerText = `▼ 展开`;
        }
    }

    // 用于存储捕获的日志
    let capturedLogs = [];

    // 运行按钮点击处理
    async function onRunClick(e) {
        const params = getUrlParams();
        //
        let code = "";
        if (blockHashAfterInp.value !== params.blockHash_1
            || blockHashInp.value !== params.blockHash
            || blockHashLast1Inp.value !== params.blockHash_2
            || blockHashLast2Inp.value !== params.blockHash_3
            || blockHashLast3Inp.value !== params.blockHash_4
            || userWalletInp.value !== params.userWallet
            || parseInt(roundInput.value) !== params.round
        ) {
            let obj = {};
            obj.blockHash_1 = blockHashAfterInp.value;
            obj.blockHash = blockHashInp.value;
            obj.blockHash_2 = blockHashLast1Inp.value;
            obj.blockHash_3 = blockHashLast2Inp.value;
            obj.blockHash_4 = blockHashLast3Inp.value;
            obj.userWallet = userWalletInp.value;
            obj.round = parseInt(roundInput.value);
            // console.log("fffffff  ", obj);
            setCodeAndInfo(obj);
            code = defaultCode;
            codeEditor.value = code;
        } else {
            code = codeEditor.value;
        }


        let result = await anonymous_fun.run(code);
        if (!isCodePass) {
            alert("js代码执行异常，请先处理异常，或重置代码");
        } else {
            if (e !== undefined && e.type === 'click') {
                for (let i = 0; i < result.length; i++) {
                    setUserRoundInfo(result[i]);
                }
            }
            // console.log("结果》》  ", result);
            return result;
        }
    }

    //更新用户每回合的结果
    function setUserRoundInfo(roundList) {
        let resultHtml = '';
        for (const round of roundList) {
            resultHtml += `
                <div class="div-round">第 ${round.roundNum} 回合 · SHA256</div>
                <div class="round-hash-item">
                    <span>${round.hexStr}</span>
                    <span>${round.boxNum}</span>
                </div>
            `;
        }

        document.getElementById("resultRound").innerHTML = resultHtml;
    }

    // 清空输出显示 (不清空捕获数组，每次运行会重置)
    function clearOutputDisplay() {
        outputContentDiv.innerHTML = '';
    }

    // 添加一条输出 (支持多种类型)
    function addOutput(message, type = 'log') {
        const line = document.createElement('div');
        line.style.marginBottom = '4px';
        line.style.borderBottom = '1px solid #2a2c3a';
        line.style.paddingBottom = '4px';

        let prefix = '';
        if (type === 'error') prefix = '❌ ';
        else if (type === 'warn') prefix = '⚠️ ';
        else if (type === 'info') prefix = 'ℹ️ ';

        const prefixSpan = document.createElement('span');
        if (type === 'error') prefixSpan.style.color = '#ff79c6';
        else if (type === 'warn') prefixSpan.style.color = '#f1fa8c';
        else prefixSpan.style.color = '#8be9fd';

        prefixSpan.textContent = prefix;

        const messageSpan = document.createElement('span');
        messageSpan.style.color = '#f8f8f2';
        // 将对象/数组等转为可读字符串
        let displayMsg;
        try {
            if (typeof message === 'object') {
                displayMsg = JSON.stringify(message, null, 2);
            } else {
                displayMsg = String(message);
            }
        } catch(e) {
            displayMsg = String(message);
        }
        messageSpan.textContent = displayMsg;

        line.appendChild(prefixSpan);
        line.appendChild(messageSpan);
        outputContentDiv.appendChild(line);
        // 自动滚动到底部
        outputContentDiv.parentElement.parentElement.scrollTop = outputContentDiv.parentElement.parentElement.scrollHeight;
    }

    // 清空输出 (仅清显示，不清console历史)
    function clearOutput() {
        outputContentDiv.innerHTML = '';
        addOutput('🧹 输出已清空，点击「运行代码」重新执行。', 'info');
    }

    const anonymous_fun = (function() {
        // 保存原始的 console 方法
        const originalConsole = {
            log: console.log,
            error: console.error,
            warn: console.warn,
            info: console.info
        };

        // 运行代码的核心函数
        // 异步执行代码的核心函数
        async function runCodeAsync(code) {
            // 1. 重置捕获日志数组
            capturedLogs = [];

            // 2. 临时替换 console 方法
            console.log = (...args) => {
                capturedLogs.push({ type: 'log', args });
                originalConsole.log(...args);
            };
            console.error = (...args) => {
                capturedLogs.push({ type: 'error', args });
                originalConsole.error(...args);
            };
            console.warn = (...args) => {
                capturedLogs.push({ type: 'warn', args });
                originalConsole.warn(...args);
            };
            console.info = (...args) => {
                capturedLogs.push({ type: 'info', args });
                originalConsole.info(...args);
            };

            // 3. 清空输出显示区域 (UI)
            clearOutputDisplay();

            let executionError = null;
            let result = undefined;
            try {
                // 包装成 async 函数执行
                const asyncFunction = new Function(`
                    return (async function() {
                        ${code}
                    })();
                `);
                result = await asyncFunction();
                // 如果有返回值且非 undefined，也打印到控制台
                if (result !== undefined) {
                    capturedLogs.push({ type: 'log', args: ['返回值 =>', result] });
                }
                isCodePass = true;
            } catch (err) {
                isCodePass = false;
                executionError = err;
                capturedLogs.push({ type: 'error', args: [err.message || err] });
            } finally {
                // 6. 恢复原始 console
                console.log = originalConsole.log;
                console.error = originalConsole.error;
                console.warn = originalConsole.warn;
                console.info = originalConsole.info;
            }

            // 7. 将所有捕获的日志渲染到输出区
            for (const log of capturedLogs) {
                // 合并参数为一个字符串（简单处理）
                const message = log.args.map(arg => {
                    if (typeof arg === 'object') {
                        try {
                            return JSON.stringify(arg);
                        } catch(e) {
                            return String(arg);
                        }
                    }
                    return String(arg);
                }).join(' ');
                addOutput(message, log.type);
            }

            // 8. 如果执行错误，额外加提示
            if (executionError) {
                addOutput(`执行异常: ${executionError.message}`, 'error');
            }
            return result;
        }

        // // 运行按钮点击处理
        // async function onRunClick() {
        //     const code = codeEditor.value;
        //     let result = await runCodeAsync(code);
        //     if (!isCodePass) {
        //         alert("js代码执行异常，请先处理异常，或重置代码");
        //     }
        //     console.log("结果》》  ", result)
        // }
        // runBtn.addEventListener('click', onRunClick);

        // 返回需要暴露的函数，因为需要new Function中的结果来渲染界面，所以只能把运行代码的函数抛出给顶层使用
        return {
            run: runCodeAsync
        };
    })();

    document.addEventListener('DOMContentLoaded', initPage);
</script>
